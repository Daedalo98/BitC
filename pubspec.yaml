name: btc_explorer
description: Turin Bitcoin Merchant Explorer using btcmap.org
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0  # OpenStreetMap widget
  latlong2: ^0.9.0     # Coordinate handling
  http: ^1.2.0         # API requests

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/